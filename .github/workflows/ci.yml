name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # dist/ is committed so the package installs from GitHub with no toolchain.
      # Fail if a source change wasn't rebuilt — keeps the shipped dist/ in sync with src/.
      - run: git diff --exit-code -- dist || (echo "::error::dist/ is out of sync with src/ — run 'npm run build' and commit dist/" && exit 1)
      - run: node dist/cli.js bench
